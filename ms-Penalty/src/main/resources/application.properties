spring.application.name=ms-penalty
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/db_penalties
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/changelog-master.xml

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
springdoc.api-docs.path=/api/v1/multas/v3/api-docs

# sublime, muestra por terminla como hibernate hace sus weas (consultas, errores, sql general)
spring.jpa.show-sql=true